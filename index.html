<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイムタイマー</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f7fb;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

h1{ margin-bottom:10px; }

#controls{ margin-bottom:20px; }

input{
  font-size:20px;
  width:80px;
  text-align:center;
}

button{
  font-size:18px;
  padding:10px 16px;
  margin:4px;
  border:none;
  border-radius:10px;
  background:#4caf50;
  color:white;
}

button:active{ transform:scale(0.95); }

#timeDisplay{
  font-size:32px;
  margin-bottom:10px;
}

canvas{
  background:white;
  border-radius:50%;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* おしまい表示 */
#finishOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
}

#finishText{
  font-size:80px;
  color:white;
  background:#ff6b6b;
  padding:40px 60px;
  border-radius:20px;
}
</style>
</head>

<body>

<h1>タイムタイマー</h1>

<div id="controls">
  分: <input id="min" type="number" value="1" min="0">
  秒: <input id="sec" type="number" value="0" min="0" max="59">
  <br>
  <button onclick="start()">スタート</button>
  <button onclick="stop()">ストップ</button>
  <button onclick="reset()">リセット</button>
</div>

<div id="timeDisplay">01:00</div>

<canvas id="canvas" width="300" height="300"></canvas>

<!-- おしまい画面 -->
<div id="finishOverlay" onclick="hideFinish()">
  <div id="finishText">おしまい</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let totalTime = 60;
let remaining = 60;
let timer = null;

// 音関連
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let beepInterval = null;

function beep(){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "square"; // ピーピーっぽく
  osc.frequency.value = 1000;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();

  gain.gain.setValueAtTime(1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);

  osc.stop(audioCtx.currentTime + 0.2);
}

function startBeepLoop(){
  beep(); // すぐ1回
  beepInterval = setInterval(beep, 400); // ピーピー繰り返し
}

function stopBeepLoop(){
  clearInterval(beepInterval);
  beepInterval = null;
}

function format(t){
  const m = Math.floor(t/60);
  const s = t%60;
  return String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
}

function draw(){
  ctx.clearRect(0,0,300,300);

  ctx.beginPath();
  ctx.arc(150,150,140,0,Math.PI*2);
  ctx.fillStyle="#eee";
  ctx.fill();

  const ratio = remaining / totalTime;

  ctx.beginPath();
  ctx.moveTo(150,150);
  ctx.arc(
    150,150,140,
    -Math.PI/2,
    -Math.PI/2 + Math.PI*2*ratio,
    false
  );
  ctx.fillStyle="#ff6b6b";
  ctx.fill();

  ctx.fillStyle="#333";
  ctx.font="40px sans-serif";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText(format(remaining),150,150);
}

function start(){
  if(timer) return;

  stopBeepLoop();

  const m = parseInt(document.getElementById("min").value)||0;
  const s = parseInt(document.getElementById("sec").value)||0;

  totalTime = m*60 + s;
  if(totalTime <= 0) return;

  remaining = totalTime;

  timer = setInterval(()=>{
    remaining--;

    if(remaining <= 0){
      remaining = 0;
      stop();
      finish();
    }

    update();
  },1000);

  update();
}

function stop(){
  clearInterval(timer);
  timer = null;
}

function reset(){
  stop();
  stopBeepLoop();
  hideFinish();
  remaining = totalTime;
  update();
}

function finish(){
  startBeepLoop();
  document.getElementById("finishOverlay").style.display = "flex";
}

function hideFinish(){
  document.getElementById("finishOverlay").style.display = "none";
  stopBeepLoop(); // タップで音停止
}

function update(){
  document.getElementById("timeDisplay").textContent = format(remaining);
  draw();
}

// 初期描画
update();
</script>

</body>
</html>
