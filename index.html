<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイムタイマー（滑らか版）</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f7fb;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

h1{ margin-bottom:10px; }

#controls{ margin-bottom:20px; }

input{
  font-size:20px;
  width:80px;
  text-align:center;
}

button{
  font-size:18px;
  padding:10px 16px;
  margin:4px;
  border:none;
  border-radius:10px;
  background:#4caf50;
  color:white;
}

button:active{ transform:scale(0.95); }

#timeDisplay{
  font-size:32px;
  margin-bottom:10px;
}

canvas{
  background:white;
  border-radius:50%;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* おしまい表示 */
#finishOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
}

#finishText{
  font-size:80px;
  color:white;
  background:#ff6b6b;
  padding:40px 60px;
  border-radius:20px;
}
</style>
</head>

<body>

<h1>タイムタイマー</h1>

<div id="controls">
  分: <input id="min" type="number" value="1" min="0">
  秒: <input id="sec" type="number" value="0" min="0" max="59">
  <br>
  <button onclick="start()">スタート</button>
  <button onclick="stop()">ストップ</button>
  <button onclick="reset()">リセット</button>
</div>

<div id="timeDisplay">01:00</div>

<canvas id="canvas" width="300" height="300"></canvas>

<!-- おしまい -->
<div id="finishOverlay" onclick="hideFinish()">
  <div id="finishText">おしまい</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let duration = 60000; // ms
let startTime = null;
let running = false;

// 音
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let beepInterval = null;

function beep(){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "square";
  osc.frequency.value = 1000;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();

  gain.gain.setValueAtTime(1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);

  osc.stop(audioCtx.currentTime + 0.2);
}

function startBeepLoop(){
  beep();
  beepInterval = setInterval(beep, 400);
}

function stopBeepLoop(){
  clearInterval(beepInterval);
  beepInterval = null;
}

// 表示フォーマット
function format(sec){
  const m = Math.floor(sec/60);
  const s = sec%60;
  return String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
}

// 描画（滑らか）
function draw(ratio, remainingMs){
  ctx.clearRect(0,0,300,300);

  // 背景円
  ctx.beginPath();
  ctx.arc(150,150,140,0,Math.PI*2);
  ctx.fillStyle="#eee";
  ctx.fill();

  // 残り
  ctx.beginPath();
  ctx.moveTo(150,150);
  ctx.arc(
    150,150,140,
    -Math.PI/2,
    -Math.PI/2 + Math.PI*2*ratio
  );
  ctx.fillStyle="#ff6b6b";
  ctx.fill();

  // テキスト
  const sec = Math.ceil(remainingMs / 1000);
  document.getElementById("timeDisplay").textContent = format(sec);

  ctx.fillStyle="#333";
  ctx.font="40px sans-serif";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText(format(sec),150,150);
}

// メインループ（60fps）
function loop(now){
  if(!running) return;

  const elapsed = now - startTime;
  const remainingMs = Math.max(0, duration - elapsed);
  const ratio = remainingMs / duration;

  draw(ratio, remainingMs);

  if(remainingMs <= 0){
    running = false;
    finish();
    return;
  }

  requestAnimationFrame(loop);
}

// スタート
function start(){
  if(running) return;

  stopBeepLoop();
  hideFinish();

  const m = parseInt(document.getElementById("min").value)||0;
  const s = parseInt(document.getElementById("sec").value)||0;

  duration = (m*60 + s) * 1000;
  if(duration <= 0) return;

  startTime = performance.now();
  running = true;

  requestAnimationFrame(loop);
}

// ストップ
function stop(){
  running = false;
}

// リセット
function reset(){
  running = false;
  stopBeepLoop();
  hideFinish();

  const m = parseInt(document.getElementById("min").value)||0;
  const s = parseInt(document.getElementById("sec").value)||0;

  duration = (m*60 + s) * 1000;

  draw(1, duration);
}

// 終了
function finish(){
  startBeepLoop();
  document.getElementById("finishOverlay").style.display = "flex";
}

// 消す
function hideFinish(){
  document.getElementById("finishOverlay").style.display = "none";
  stopBeepLoop();
}

// 初期描画
draw(1, duration);
</script>

</body>
</html>
